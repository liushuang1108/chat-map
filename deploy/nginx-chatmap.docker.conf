# 适用于：Nginx 跑在 Docker 里，且挂载与下面一致时
#   宿主机 /data/dockerData/nginx/conf.d  -> /etc/nginx/conf.d
#   宿主机 /data/dockerData/nginx/html    -> /usr/share/nginx/html
#
# 使用步骤：
# 1) 将本文件放到宿主机：/data/dockerData/nginx/conf.d/chatmap.conf
# 2) 删除或改名同目录下的 default.conf（否则会一直显示 Welcome to nginx!）
# 3) 把 npm run build 得到的 dist/* 上传到 /data/dockerData/nginx/html/
# 4) docker exec <nginx容器名> nginx -t && docker exec <nginx容器名> nginx -s reload
#
# 后端在「宿主机」上跑时：容器内不能用 127.0.0.1 访问宿主机，下面用 Docker 网桥网关。
# 若仍连不上 API，在容器内试 curl http://172.17.0.1:8080 或配置 --add-host=host.docker.internal:host-gateway 后改用 host.docker.internal。

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://172.17.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
