# 复制到 /etc/nginx/conf.d/chatmap.conf（或 sites-available 下 include）
# Nginx 跑在 Docker 且静态目录挂到 /usr/share/nginx/html 时，请用 nginx-chatmap.docker.conf
# 将 root 改成你上传前端 dist 的实际路径
#
# 无域名、仅 IP 访问：浏览器访问 http://你的公网IP/
# 前端 axios 使用相对路径 /api，与页面同域，无需改 CORS。
#
# 若仍出现「Welcome to nginx!」：说明默认站点仍在抢 80 端口，请先执行
#   sudo rm /etc/nginx/sites-enabled/default
# 再 nginx -t && sudo systemctl reload nginx
# （下面 default_server 与系统默认二选一，保留本配置前须去掉 default 里的 default_server）

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/chatmap/dist;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
